<!DOCTYPE html>
<html>
<head>
    <title>card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500;1,500&family=Sofia&display=swap" rel="stylesheet">
    <style>
    body {
            background-color: hsl(47, 88%, 63%);
            font-family: 'figtree', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
    .card {
            border: 1px solid black;
            padding: 10px;
            width: 400px;
            height: auto;
            background-color: hsl(0, 0%, 100%);
            border-radius: 5px;
            box-shadow: 5px 5px;
            align-content: center;
         }

    .learn {
             width: 50px;
             background-color: hsl(47, 88%, 63%);
             padding: 3px;
             border-radius: 3px;
             font-size: 12px;
             font: bold;
    } 
    p {
        font-size: 16px;
        font-family: 'figtree', sans-serif;
    } 
    
    img {
        width: 100%;
        border-radius: 5px;
    }


    .author-section {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .author-avatar {
        width: 20px;
    }

    .author-name {
        font-size: 14px;
        font-weight: bold;
    }

    h2:hover {
        color: hsl(47, 88%, 63%);
    }

    </style>
</head>
<body>
    <div class="card">
        <img src="file:///C:/Users/PC1/Desktop/mariam.html/mari%20vs%20html/cover.svg" alt="photo">
        <br><br>
        <div class="learn">Learning</div>
        <p>Published 21 Dec 2023</p>
        <h2>HTML & CSS foundations</h2>
        <p style="color: hsl(0, 0%, 42%);">These languages are the backbone of every website, defining structure, content, and presentation.</p>
          
          <div class="author-section">
            <img class="author-avatar" src="file:///C:/Users/PC1/Desktop/mariam.html/mari%20vs%20html/image-avatar.webp">
            <p class="author-name">Greg Hooper</p>
          </div>
        
    </div>
</body>
</html>
